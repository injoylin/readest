name: Build Readest Big Sur Intel

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: macos-14

    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      NODE_OPTIONS: "--max-old-space-size=8192"

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5
          run_install: false


      - name: Verify Node and pnpm
        run: |
          node -v
          pnpm -v


      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin


      - name: Install dependencies
        run: |
          pnpm install


      - name: Setup Readest vendors
        run: |
          pnpm --filter @readest/readest-app setup-vendors


      - name: Patch Big Sur minimum version
        working-directory: apps/readest-app
        run: |
          node <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const configs = [
            "src-tauri/tauri.conf.json",
            "src-tauri/tauri.conf.json5"
          ];

          let patched = false;

          for (const file of configs) {

            if (fs.existsSync(file)) {

              console.log("Found:", file);

              let content = fs.readFileSync(file, "utf8");

              let json;

              try {
                json = JSON.parse(content);
              } catch(e) {
                console.log("Skip invalid json:", file);
                continue;
              }


              json.bundle ??= {};
              json.bundle.macOS ??= {};

              json.bundle.macOS.minimumSystemVersion = "11.0";


              fs.writeFileSync(
                file,
                JSON.stringify(json, null, 2)
              );


              console.log("Patched Big Sur target");

              patched = true;
              break;
            }
          }


          if (!patched) {
            console.log("No tauri config found");
          }

          EOF


      - name: Build Readest Intel DMG
        working-directory: apps/readest-app
        run: |
          pnpm tauri build --target x86_64-apple-darwin


      - name: Upload Big Sur Intel Build
        uses: actions/upload-artifact@v4
        with:
          name: Readest-BigSur-Intel
          path: |
            apps/readest-app/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            apps/readest-app/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
