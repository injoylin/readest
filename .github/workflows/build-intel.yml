name: Build Intel Only (Fast Linux)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # 改用 Linux 虚拟机，秒开不排队！
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Dependencies
        run: |
          pnpm install
          pnpm --filter @readest/readest-app setup-vendors

      - name: Install macOS Cross Compiler Tools
        run: |
          # 在 Linux 上安装编译 Mac 必须的跨平台工具链
          sudo apt-get update
          sudo apt-get install -y libclang-dev lld

      - name: Set up Rust for Mac Target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build for Big Sur
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          # 注入最低系统要求
          sed -i 's/"macOS": {/"macOS": { "minimumSystemVersion": "11.0",/g' src-tauri/tauri.conf.json || true
          
          # 指定只编译 Mac Intel 架构
          pnpm tauri build --target x86_64-apple-darwin

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Readest-BigSur-Intel
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
