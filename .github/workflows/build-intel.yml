name: Build Intel Only (Standard Mac)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest # 改用最新的 Mac 虚拟机，资源极多，秒开不用排长队！
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 彻底消除 Deprecated 警告

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: |
          pnpm install
          pnpm --filter @readest/readest-app setup-vendors

      - name: Set up Rust for Intel Mac
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin # 即使在 M1 虚拟机上，也强制下载 Intel 工具链

      - name: Build for Big Sur
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: "11.0" # 强制底层编译器兼容 Big Sur 11.0
        run: |
          # 无污染注入最低系统版本要求
          sed -i '' 's/"macOS": {/"macOS": { "minimumSystemVersion": "11.0",/g' src-tauri/tauri.conf.json || true
          
          # 核心：明确命令 Tauri 仅生成 Intel (x86_64) 架构的 dmg
          pnpm tauri build --target x86_64-apple-darwin

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Readest-BigSur-Intel
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
