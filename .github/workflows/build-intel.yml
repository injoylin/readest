name: Build Intel Only (Standard Mac)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # 固定使用 macOS 14 虚拟机，避开过新环境的干扰
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # 升级到 v4，彻底解决所有 Node.js 废弃警告

      - name: Install Dependencies
        run: |
          pnpm install
          pnpm --filter @readest/readest-app setup-vendors

      - name: Set up Rust for Intel Mac
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Inject Big Sur Config & Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          # 放弃不稳定的 sed，改用安全的 node 脚本直接精准修改 tauri 配置文件
          node -e "
            const fs = require('fs');
            const file = 'src-tauri/tauri.conf.json';
            if (fs.existsSync(file)) {
              let json = JSON.parse(fs.readFileSync(file, 'utf8'));
              if (!json.bundle) json.bundle = {};
              if (!json.bundle.macOS) json.bundle.macOS = {};
              json.bundle.macOS.minimumSystemVersion = '11.0';
              fs.writeFileSync(file, JSON.stringify(json, null, 2));
              console.log('Successfully injected Big Sur target.');
            } else {
              console.log('tauri.conf.json not found, skipping.');
            }
          "
          
          # 执行编译
          pnpm tauri build --target x86_64-apple-darwin

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Readest-BigSur-Intel
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
